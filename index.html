<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VSL Prometida</title>
  <style>
    :root {
      --accent: #16c60c;      /* cor do botão */
      --accent-hover: #12a80a;
      --bg: #0b0b0f;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    .headline {
      max-width: 760px;
      text-align: center;
      font-size: clamp(20px, 4vw, 30px);
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 22px;
    }
    .headline span { color: var(--accent); }

    /* ---- Player Panda (responsivo 16:9) ---- */
    .player {
      position: relative;
      width: 100%;
      max-width: 820px;
      aspect-ratio: 16 / 9;   /* se o vídeo for vertical, me avisa que eu troco */
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .player iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <h1 class="headline">
    Não é a sua aparência. Não é a sua idade.<br />
    <span>É isso que está bloqueando a sua promessa.</span>
  </h1>

  <div class="player">
    <iframe
      id="panda-54af5feb-b8d3-4bc0-8f6b-aebd5b8d9b7b"
      src="https://player-vz-1721f71d-9da.tv.pandavideo.com.br/embed/?v=54af5feb-b8d3-4bc0-8f6b-aebd5b8d9b7b&autoplay=true"
      allow="accelerometer;gyroscope;autoplay;encrypted-media;picture-in-picture"
      allowfullscreen="true"
      fetchpriority="high">
    </iframe>
  </div>

</body>
</html>
